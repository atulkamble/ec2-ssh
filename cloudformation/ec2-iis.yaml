AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Provisions a Windows Server 2022 EC2 instance with IIS installed and a
  sample website deployed automatically via UserData.

# ─────────────────────────────────────────────────────────────────────────────
# Parameters
# ─────────────────────────────────────────────────────────────────────────────
Parameters:
  InstanceType:
    Type: String
    Default: t2.micro
    AllowedValues:
      - t2.micro
      - t2.small
      - t2.medium
      - t3.micro
      - t3.small
    Description: EC2 instance type (t2.micro is Free Tier eligible).

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Name of an existing EC2 key pair for RDP password decryption.

  RdpAllowedCidr:
    Type: String
    Default: "0.0.0.0/0"
    AllowedPattern: "^(\\d{1,3}\\.){3}\\d{1,3}/\\d{1,2}$"
    Description: >
      CIDR block allowed to connect via RDP (port 3389).
      Restrict to your IP for better security, e.g. 203.0.113.10/32.

# ─────────────────────────────────────────────────────────────────────────────
# Mappings – latest Windows Server 2022 AMI per region (update as needed)
# ─────────────────────────────────────────────────────────────────────────────
Mappings:
  RegionAMI:
    us-east-1:
      AMI: ami-0f9c44e98edf38a2b   # Windows Server 2022 Base
    us-west-2:
      AMI: ami-0a70b9d193ae8a799
    ap-south-1:
      AMI: ami-0f5ee92e2d63afc18   # Mumbai
    eu-west-1:
      AMI: ami-0905a3c97561e0b69   # Ireland
    ap-southeast-1:
      AMI: ami-0c94855ba95c71c99   # Singapore

# ─────────────────────────────────────────────────────────────────────────────
# Resources
# ─────────────────────────────────────────────────────────────────────────────
Resources:

  # ── Security Group ──────────────────────────────────────────────────────────
  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: windows-iis-sg
      GroupDescription: Allow HTTP (80) from anywhere and RDP (3389) from allowed CIDR
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
          Description: HTTP – public web traffic
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: !Ref RdpAllowedCidr
          Description: RDP – remote desktop access
      Tags:
        - Key: Name
          Value: windows-iis-sg

  # ── EC2 Instance ─────────────────────────────────────────────────────────────
  WindowsIISInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [RegionAMI, !Ref "AWS::Region", AMI]
      KeyName: !Ref KeyPairName
      SecurityGroupIds:
        - !Ref WebServerSecurityGroup
      Tags:
        - Key: Name
          Value: windows-iis-server
      UserData:
        Fn::Base64: |
          <powershell>
          # Install IIS
          Install-WindowsFeature -Name Web-Server -IncludeManagementTools -IncludeAllSubFeature

          # Configure service
          Set-Service -Name W3SVC -StartupType Automatic
          Start-Service -Name W3SVC

          # Remove default IIS files
          $wwwroot = "C:\inetpub\wwwroot"
          @("iisstart.htm","iisstart.png") | ForEach-Object {
              $p = Join-Path $wwwroot $_
              if (Test-Path $p) { Remove-Item $p -Force }
          }

          # Deploy website
          $html = @"
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <title>AWS IIS Website</title>
              <style>
                  body { font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#232f3e,#ff9900);
                         min-height:100vh; display:flex; align-items:center; justify-content:center; margin:0; }
                  .box { background:#fff; border-radius:12px; padding:48px; max-width:680px;
                         width:90%; box-shadow:0 20px 60px rgba(0,0,0,.3); text-align:center; }
                  h1   { color:#232f3e; }
                  h2   { color:#ff9900; font-size:1rem; letter-spacing:1px; text-transform:uppercase; }
                  .ok  { display:inline-block; background:#28a745; color:#fff;
                         padding:6px 16px; border-radius:20px; margin-top:20px; font-weight:600; }
              </style>
          </head>
          <body>
              <div class="box">
                  <div style="font-size:48px">&#9729;&#65039;</div>
                  <h1>Website Hosted on AWS Windows EC2</h1>
                  <h2>Cloud Computing Practical Lab</h2>
                  <p style="color:#555;line-height:1.7">
                      Served by <strong>IIS</strong> on <strong>Windows Server 2022</strong> in AWS EC2.
                  </p>
                  <div class="ok">&#10003; Server is Live</div>
              </div>
          </body>
          </html>
          "@
          Set-Content -Path (Join-Path $wwwroot "index.html") -Value $html -Encoding UTF8

          iisreset /restart
          "[$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')] Bootstrap complete." |
              Out-File "C:\setup-log.txt" -Encoding UTF8
          </powershell>

# ─────────────────────────────────────────────────────────────────────────────
# Outputs
# ─────────────────────────────────────────────────────────────────────────────
Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref WindowsIISInstance

  PublicIP:
    Description: Public IP address of the Windows EC2 instance
    Value: !GetAtt WindowsIISInstance.PublicIp

  WebsiteURL:
    Description: URL to access the hosted website
    Value: !Sub "http://${WindowsIISInstance.PublicIp}"

  RDPNote:
    Description: How to connect via RDP
    Value: !Sub >
      Open the EC2 Console, select instance ${WindowsIISInstance},
      click Connect > RDP Client > Get Password, upload your PEM key to decrypt,
      then open the downloaded .rdp file with those credentials.
